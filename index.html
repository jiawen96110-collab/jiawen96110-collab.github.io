        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}

        /* 页面大标题 */
        .title{

            color:#2d5cf0;
            padding:10px 0 30px 0;

        }

        /* 险种分类标题栏 */

            color:#ffffff;
            background:#1d4ed8;
            padding:12px 15px;
            border-radius:8px;
            margin-bottom:12px;
            font-weight:600;
        }

        /* 单个产品卡片样式 */
        .product-card{
            background:#ffffff;
            padding:14px 18px;
            border-radius:10px;
            margin-bottom:10px;
            box-shadow:0 1px 4px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }
        .product-card:hover{
            background:#f0f5ff;
            transform: translateY(-1px);
        }
        /* 产品跳转链接 */
        .product-card a{
            color:#333333;
            text-decoration:none;
            font-size:16px;
            display:block;
        }

        /* 底部个人信息 */
        .footer{
            text-align:center;
            margin-top:40px;
            padding:20px;
            color:#666666;
            font-size:14px;
        }
    </style>
